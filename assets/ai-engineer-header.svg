<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title description">
  <title id="title">Sai Chandu, AI Engineer</title>
  <desc id="description">Dark emerald technology header with a neural network graph.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1200" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07140F"/>
      <stop offset="0.55" stop-color="#0D251A"/>
      <stop offset="1" stop-color="#06110D"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#56F09F" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#56F09F" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#56F09F" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" stroke="#56F09F" stroke-opacity="0.07"/>
    </pattern>
  </defs>
  <rect width="1200" height="300" rx="18" fill="url(#background)"/>
  <rect width="1200" height="300" rx="18" fill="url(#grid)"/>
  <path d="M720 76L850 145L982 86L1112 158" stroke="url(#line)" stroke-width="2"/>
  <path d="M760 224L850 145L955 238L1112 158" stroke="url(#line)" stroke-width="2"/>
  <path d="M690 152L850 145L1015 190" stroke="url(#line)" stroke-width="2"/>
  <circle cx="720" cy="76" r="7" fill="#56F09F" filter="url(#glow)"/>
  <circle cx="850" cy="145" r="10" fill="#56F09F" filter="url(#glow)"/>
  <circle cx="982" cy="86" r="7" fill="#56F09F" filter="url(#glow)"/>
  <circle cx="1112" cy="158" r="8" fill="#56F09F" filter="url(#glow)"/>
  <circle cx="760" cy="224" r="7" fill="#56F09F" filter="url(#glow)"/>
  <circle cx="955" cy="238" r="8" fill="#56F09F" filter="url(#glow)"/>
  <circle cx="690" cy="152" r="6" fill="#56F09F" filter="url(#glow)"/>
  <circle cx="1015" cy="190" r="6" fill="#56F09F" filter="url(#glow)"/>
  <text x="74" y="123" fill="#F4FFF8" font-family="Arial, Helvetica, sans-serif" font-size="55" font-weight="700" letter-spacing="-1">Sai Chandu</text>
  <text x="78" y="168" fill="#56F09F" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="600" letter-spacing="3">AI ENGINEER · AGENTIC SYSTEMS</text>
  <text x="78" y="213" fill="#A6CBB7" font-family="Arial, Helvetica, sans-serif" font-size="18">Reliable AI. Measurable quality. Secure delivery.</text>
</svg>
